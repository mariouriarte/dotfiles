# -----------------------------------------------------------------------------
# CONFIGURACIÓN GENERAL DE TMUX
# -----------------------------------------------------------------------------

# Mejorar los colores (necesario para que las transparencias y tonos se vean bien)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Ventanas y paneles empiezan en 1 para usar Alt+1 como primera pestaña
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Posición de la barra de estado
set-option -g status-position bottom
set -g status on
set -gu status-format[1]
set -g status-interval 1

# Colores de fondo de la barra
set -g status-style bg="#1e1e2e",fg=white

# -----------------------------------------------------------------------------
# LADO IZQUIERDO: Sesión y Tiempo
# -----------------------------------------------------------------------------
set -g status-left-length 50
# #S es el nombre de la sesión
#  es el separador diagonal
set -g status-left "#[bg=#89dceb,fg=#11111b,bold] #S #[bg=#313244,fg=#89dceb,none]#[bg=#313244,fg=#cdd6f4,none] %H:%M #[bg=default,fg=#313244,none] "

# -----------------------------------------------------------------------------
# LADO DERECHO: Día y Hostname
# -----------------------------------------------------------------------------
set -g status-right-length 50
#  es el separador diagonal inverso
set -g status-right "#[bg=default,fg=#313244,none]#[bg=#313244,fg=#cdd6f4,none] %a #[bg=#313244,fg=#89dceb,none]#[bg=#89dceb,fg=#11111b,bold] #H "

# -----------------------------------------------------------------------------
# VENTANAS (Pestañas centrales)
# -----------------------------------------------------------------------------
set -g status-justify absolute-centre

# Ventana inactiva
set -w -g window-status-format "#[bg=default,fg=#6c7086] #I / #W "

# Ventana activa
set -w -g window-status-current-format "#[bg=#45475a,fg=#f5c2e7,bold] #I / #W / * "

# Separador entre ventanas
set -w -g window-status-separator "  "

# Navegación directa entre ventanas con Alt+1..9 (sin prefijo)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Crear una nueva ventana con Ctrl+t (sin prefijo)
bind -n C-t new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# NOTAS ADICIONALES PARA EL ACABADO VISUAL
# -----------------------------------------------------------------------------
# Si aún ves "espacio sobrante" en la barra, recuerda:
# 1. Tu emulador de terminal (Kitty, Alacritty, iTerm) es el que define la altura.
# 2. Busca "line height" o "vertical cell spacing" en los ajustes de tu terminal
#    y ponlo a 1.0 (o 0px extra).
# 3. Asegúrate de usar una fuente que termine en "Nerd Font" (o "Nerd Font Mono").
