# --- CONFIGURACION GENERAL ---
set -g status-position top
set -g status 2
set -g status-format[1] ""
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g automatic-rename on
set -g allow-rename off
set -g automatic-rename-format '#{?#{m:*opencode*,#{pane_current_command}},opencode,#{?#{m:*claudecode*|*claude*,#{pane_current_command}},claudecode,#{pane_current_command}}}'

# Configuracion para eliminar "espacios" en Catppuccin
set -g @catppuccin_window_left_separator "█"
set -g @catppuccin_window_right_separator "█"
set -g @catppuccin_window_middle_separator " | "
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "none"
set -g @catppuccin_window_current_fill "all"

# Si quieres que el fondo sea transparente
set -g status-bg default
set -g status-style bg=default

# --- TECLAS DE ACCESO (ERGO) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Dividir paneles en el path actual
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegacion tipo Vim para paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navegacion directa entre ventanas con Alt+1..9 (sin prefijo)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- PLUGINS (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Configuracion del tema Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "round"

# Inicializar TPM (debe ir al final)
run '~/.tmux/plugins/tpm/tpm'
